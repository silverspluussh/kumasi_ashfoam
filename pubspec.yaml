name: ashfoam_sadiq
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  drift: ^2.20.0 # Core drift logic
  sqlite3_flutter_libs: ^0.5.0 # Bundles sqlite3.dll for Windows
  path_provider: ^2.1.0 # To find the Documents folder on Windows
  path: ^1.9.0
  dio: ^5.9.2 # HTTP client replacement for http
  forui: 0.21.2 # UI components
  printing: ^5.14.3 # Print documents
  syncfusion_flutter_core: # Syncfusion core dependency
  syncfusion_flutter_charts: # Charts
  syncfusion_flutter_datagrid: # Data grid / table
  syncfusion_flutter_xlsio: # Excel generation
  syncfusion_flutter_datagrid_export: # Export DataGrid to Excel/PDF
  pdf: ^3.12.0 # PDF generation
  get_it: ^8.1.0 # Service locator
  flutter_riverpod:
  flutter_slidable: ^3.1.0 # Swipe actions
  another_flushbar: ^1.0.0 # Notifications
  badges: ^3.0.2 # Badge counts
  connectivity_plus: ^4.0.0 # Online/offline detection
  flutter_secure_storage: ^9.2.2 # Local settings
  toastification: ^3.1.0
  awesome_extensions: ^2.1.0
  intl:
  uuid: ^4.5.3
  supabase_flutter:
  riverpod_annotation:
  excel: ^4.0.6
  file_picker: ^8.1.7

dev_dependencies:
  build_runner:
  custom_lint:
  drift_dev: ^2.31.0
  riverpod_generator:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/AppIcon256.png"
  windows:
    generate: true
    image_path: "assets/AppIcon256.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/AppIcon256.png"
  android:
    generate: true
    image_path: "assets/AppIcon64.png"
    icon_size: 64

flutter:
  uses-material-design: true

  assets:
    - assets/
